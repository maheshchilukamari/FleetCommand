services:
  db:
    image: postgres:16-alpine
    container_name: fleetiq-db
    environment:
      POSTGRES_DB: fleetiq
      POSTGRES_USER: fleetiq
      POSTGRES_PASSWORD: fleetiq
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fleetiq -d fleetiq"]
      interval: 5s
      timeout: 5s
      retries: 8

  backend:
    build:
      context: ./backend
    container_name: fleetiq-api
    environment:
      DATABASE_URL: postgresql+psycopg://fleetiq:fleetiq@db:5432/fleetiq
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      SIMULATION_INTERVAL_SECONDS: 3
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:8000
        VITE_MAPBOX_TOKEN: ${VITE_MAPBOX_TOKEN:-}
    container_name: fleetiq-web
    environment:
      VITE_API_URL: http://localhost:8000
      VITE_MAPBOX_TOKEN: ${VITE_MAPBOX_TOKEN:-}
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  postgres_data:
